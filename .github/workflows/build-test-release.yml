name: Build, Test, Package, Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build native BLE monitor
        shell: cmd
        run: native-monitor\build.cmd

      - name: Build Credential Provider
        shell: cmd
        run: credential-provider\build.cmd

      - name: Test native BLE monitor core
        shell: cmd
        run: native-monitor\bin\x64\watchunlock-native.exe selftest

      - name: Test PowerShell core
        shell: powershell
        run: .\watchunlock.ps1 selftest -NoBluetooth

      - name: Check JavaScript syntax
        shell: powershell
        run: |
          node --check web\server.js
          node --check web\public\app.js

      - name: Check package script syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path scripts\package.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Package
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") {
            $env:GITHUB_REF_NAME
          } elseif ($env:GITHUB_REF_NAME -eq "master") {
            "latest"
          } else {
            $env:GITHUB_SHA.Substring(0, 12)
          }
          .\scripts\package.ps1 -SkipBuild -Version $version

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchunlock-windows
          path: dist/*.zip
          if-no-files-found: error

      - name: Update latest tag
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest $env:GITHUB_SHA
          git push origin refs/tags/latest --force

      - name: Publish latest development release
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest development build
          body: |
            Automatic development build from master.

            Commit: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          prerelease: true
          make_latest: false
          files: dist/*.zip

      - name: Publish versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
